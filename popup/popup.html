<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSFW Filter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-row">
        <span class="logo">🛡️</span>
        <div>
          <h1>NSFW Filter</h1>
          <p class="subtitle" data-i18n="extSubtitle"></p>
        </div>
        <button id="languageToggle" class="language-btn" title="Switch language"></button>
      </div>
      <p class="beta-warning" data-i18n="betaWarning"></p>
    </div>

    <div class="toggle-section">
      <label class="toggle-label">
        <span data-i18n="protectionActive"></span>
        <div class="toggle-switch">
          <input type="checkbox" id="enableFilter" checked>
          <span class="slider"></span>
        </div>
      </label>
    </div>

    <div class="sensitivity-section">
      <div class="sensitivity-header">
        <span data-i18n="filterSensitivity"></span>
        <span id="sensitivityValue" class="sensitivity-value">50%</span>
      </div>
      <div class="slider-container">
        <input type="range" id="sensitivity" min="0" max="100" value="50" class="range-slider">
        <div class="slider-labels">
          <span data-i18n="sensitivitySoft"></span>
          <span data-i18n="sensitivityStrict"></span>
        </div>
      </div>
    </div>

    <div class="model-section">
      <div class="model-header">
        <span data-i18n="modelSelection"></span>
      </div>
      <select id="modelSelect" class="model-select">
        <option value="MobileNet_v2" data-i18n="modelMobileNet"></option>
        <option value="InceptionV3" data-i18n="modelInceptionV3"></option>
      </select>
    </div>

    <div class="stats-section">
      <div class="stat-item">
        <span class="stat-number" id="blockedCount">0</span>
        <span class="stat-label" data-i18n="statsBlocked"></span>
      </div>
      <div class="stat-item">
        <span class="stat-number" id="scannedCount">0</span>
        <span class="stat-label" data-i18n="statsScanned"></span>
      </div>
    </div>

    <div class="footer">
      <div class="footer-row">
        <button id="resetStats" class="btn-reset" data-i18n="resetStats"></button>
        <div class="support-links">
          <a href="https://buymeacoffee.com/aristarh.ucolov" target="_blank" class="support-link coffee" title="Buy Me a Coffee">☕</a>
          <a href="https://www.donationalerts.com/r/aristarh_ucolov" target="_blank" class="support-link donate" title="DonationAlerts">💜</a>
        </div>
      </div>
      <p class="version" id="versionText"></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
